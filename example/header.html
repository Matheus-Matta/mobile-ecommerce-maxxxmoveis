<header class="fixed top-0 left-0 right-0 z-50 px-4 py-4 md:px-8 pt-6">
<div class="flex items-center justify-between gap-3 max-w-5xl mx-auto">
<!-- Leading Icon: Menu -->
<button class="flex-shrink-0 w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-[0_8px_20px_rgba(48,50,59,0.06)] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">menu</span>
</button>
<!-- Search Bar (Center) -->
<div class="flex-grow h-12 bg-surface-container-highest rounded-full flex items-center px-4 shadow-[0_4px_12px_rgba(48,50,59,0.03)] hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant mr-2">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-sm font-body text-on-surface placeholder:text-on-surface-variant outline-none" placeholder="O que você está procurando" type="text"/>
</div>
<!-- Trailing Icon: Cart -->
<button class="flex-shrink-0 w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-[0_8px_20px_rgba(48,50,59,0.06)] hover:opacity-80 transition-opacity active:scale-95 duration-200 relative">
<span class="material-symbols-outlined text-on-surface">shopping_cart</span>
<span class="absolute top-2 right-2 w-2.5 h-2.5 bg-primary rounded-full"></span>
</button>
</div>
</header>
