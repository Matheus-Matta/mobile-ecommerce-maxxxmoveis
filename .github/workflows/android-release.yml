name: Android APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}
      EXPO_PUBLIC_SITE_URL: ${{ vars.EXPO_PUBLIC_SITE_URL }}
      EXPO_PUBLIC_ALLOWED_ORIGINS: ${{ vars.EXPO_PUBLIC_ALLOWED_ORIGINS }}
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_NOTIFICATION_CHANNEL_ID: ${{ vars.EXPO_PUBLIC_NOTIFICATION_CHANNEL_ID }}
      EXPO_PUBLIC_PUSH_TOKEN_STORAGE_KEY: ${{ vars.EXPO_PUBLIC_PUSH_TOKEN_STORAGE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore google-services.json
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          fi

      - name: Build APK with EAS
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN secret."
            exit 1
          fi

          npx eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Download APK
        id: apk
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="manual-${GITHUB_RUN_NUMBER}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          safe_tag="$(printf '%s' "$tag" | tr '/\\:*?"<>|' '-')"
          apk_name="maxxxmoveis-${safe_tag}.apk"
          artifact_url="$(jq -r '
            if type == "array" then .[0] else . end
            | .artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty
          ' eas-build.json)"

          if [ -z "$artifact_url" ]; then
            echo "Could not find APK URL in EAS output."
            cat eas-build.json
            exit 1
          fi

          curl -fL "$artifact_url" -o "$apk_name"
          echo "artifact_name=android-apk-${safe_tag}" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.artifact_name }}
          path: ${{ steps.apk.outputs.apk_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          APK_NAME: ${{ steps.apk.outputs.apk_name }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$APK_NAME" --clobber
          else
            gh release create "$tag" "$APK_NAME" \
              --title "$tag" \
              --notes "APK Android gerado automaticamente pelo GitHub Actions."
          fi
